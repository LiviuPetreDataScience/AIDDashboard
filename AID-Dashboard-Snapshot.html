<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AID Dashboard — Snapshot</title>
<style>
:root{
  --primary:#0067c5; --primary-hover:#00529e; --accent:#111d41; --accent-hover:#1c2c5e;
  --secondary:#686868; --bg:#ffffff; --surface:#ffffff; --surface-alt:#f1f4f8; --tint:#eaf3fc;
  --border:#d8dae0; --text:#1f2430; --muted:#6b7280; --danger:#c0392b;
  --radius:8px; --radius-sm:4px; --shadow:0 1px 2px rgba(17,29,65,.08);
  --font:'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font);color:var(--text);background:var(--surface-alt);font-size:14px}
button{font-family:inherit}
.app{display:flex;flex-direction:column;min-height:100vh}
/* Header */
.hdr{height:56px;background:var(--primary);color:#fff;display:flex;align-items:center;padding:0 1rem;gap:.75rem;position:sticky;top:0;z-index:10}
.hdr .brand{font-weight:700;font-size:1.05rem;letter-spacing:.02em}
.hdr .tag{font-size:.75rem;background:rgba(255,255,255,.18);padding:.15rem .5rem;border-radius:999px}
.hdr .spacer{flex:1}
.hdr .asof{font-size:.75rem;opacity:.9}
.body{display:flex;flex:1;min-height:0}
/* Sidebar */
.side{width:210px;background:var(--accent);color:#cdd5ea;padding:.75rem 0;flex-shrink:0}
.side a{display:block;padding:.55rem 1.1rem;color:#cdd5ea;cursor:pointer;text-decoration:none;font-size:.92rem;border-left:3px solid transparent}
.side a:hover{background:rgba(255,255,255,.06);color:#fff}
.side a.active{background:rgba(255,255,255,.10);color:#fff;border-left-color:var(--primary);font-weight:600}
/* Main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.content{padding:1rem 1.25rem 2rem;flex:1}
.footer{background:var(--accent);color:#9fa9c4;text-align:center;padding:.6rem;font-size:.75rem}
/* Top tabs */
.tabs{display:flex;flex-wrap:wrap;gap:.25rem;border-bottom:2px solid var(--border);margin-bottom:1rem}
.tabs button{background:none;border:none;padding:.5rem .8rem;cursor:pointer;color:var(--muted);font-size:.88rem;border-bottom:2px solid transparent;margin-bottom:-2px}
.tabs button:hover{color:var(--text)}
.tabs button.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
/* Headings + toolbar */
h2.page{margin:.2rem 0 .1rem;font-size:1.3rem}
.sub{color:var(--muted);font-size:.85rem;margin-bottom:.9rem}
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:.6rem;margin-bottom:.9rem}
.toolbar label{display:flex;align-items:center;gap:.4rem;font-size:.85rem;color:var(--muted)}
select,input[type=search],input[type=text]{padding:.4rem .5rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;color:var(--text);font-size:.85rem}
/* Tables */
table.grid{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
table.grid th,table.grid td{text-align:left;padding:.5rem .7rem;border-bottom:1px solid var(--border);vertical-align:top;font-size:.85rem}
table.grid th{background:var(--primary);color:#fff;font-weight:600;position:sticky;top:0}
table.grid tr:nth-child(even) td{background:#fafbfd}
table.grid td.num,table.grid th.num{text-align:right}
.empty{color:var(--muted);padding:1rem;font-style:italic}
.scroll{overflow:auto;max-height:70vh;border-radius:var(--radius)}
/* Overall definition grid */
.defgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:.4rem .9rem;background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
.def{display:flex;justify-content:space-between;gap:1rem;padding:.35rem 0;border-bottom:1px dashed var(--border)}
.def .k{color:var(--muted);font-size:.82rem}
.def .v{font-weight:600;text-align:right}
.pill{display:inline-block;background:var(--surface-alt);border:1px solid var(--border);border-radius:999px;padding:.05rem .5rem;margin:.1rem;font-size:.78rem;font-weight:500}
/* KPI + charts */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.75rem;margin-bottom:1rem}
.kpi{background:#fff;border:1px solid var(--border);border-top:3px solid var(--primary);border-radius:var(--radius);padding:.9rem 1rem;box-shadow:var(--shadow)}
.kpi .val{font-size:1.5rem;font-weight:700;color:var(--accent)}
.kpi .lab{font-size:.78rem;color:var(--muted);margin-top:.25rem}
.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:.75rem}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:.75rem .9rem;box-shadow:var(--shadow)}
.card.wide{grid-column:span 2}
@media(max-width:900px){.card.wide{grid-column:span 1}}
.card h3{margin:0 0 .5rem;font-size:.95rem;color:var(--accent)}
.filters{display:flex;flex-wrap:wrap;align-items:flex-end;gap:.75rem;padding:.75rem 1rem;background:var(--surface-alt);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.75rem}
.filters .f{display:flex;flex-direction:column;gap:.25rem;min-width:170px;flex:1 1 170px;font-size:.78rem;color:var(--muted)}
.btn{padding:.45rem .9rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;cursor:pointer;font-size:.85rem}
.btn:hover{background:var(--surface-alt)}
.btn:disabled{opacity:.5;cursor:default}
.chips{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.75rem}
.chip{display:inline-flex;align-items:center;gap:.4rem;padding:.25rem .6rem;border:none;border-radius:999px;background:var(--primary);color:#fff;font-size:.8rem;cursor:pointer}
.legend{display:flex;flex-wrap:wrap;gap:.4rem .8rem;margin-top:.5rem;font-size:.78rem}
.legend .li{display:flex;align-items:center;gap:.35rem;cursor:pointer}
.legend .sw{width:11px;height:11px;border-radius:2px;display:inline-block}
.pie-wrap{display:flex;align-items:center;justify-content:center}
.bar-row{display:grid;grid-template-columns:130px 1fr 34px;align-items:center;gap:.5rem;margin:.3rem 0;font-size:.8rem}
.bar-row .lbl{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{display:flex;height:18px;background:var(--surface-alt);border-radius:3px;overflow:hidden}
.bar-seg{height:100%;cursor:pointer}
.bar-tot{text-align:right;color:var(--muted)}
.note{background:#fff;border:1px dashed var(--border);border-radius:var(--radius);padding:1rem;color:var(--muted)}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <span class="brand">AID Dashboard</span>
    <span class="tag">Static snapshot</span>
    <span class="spacer"></span>
    <span class="asof" id="asof"></span>
  </div>
  <div class="body">
    <nav class="side" id="side"></nav>
    <div class="main">
      <div class="content" id="content"></div>
      <div class="footer">AID Dashboard — shared snapshot. Data is read-only and reflects the app at export time.</div>
    </div>
  </div>
</div>

// ---- Dashboard logic (mirrors the React Automations dashboard) ----
const NOW=new Date(DATA.nowIso);
function dimVal(f,dim){
  switch(dim){
    case 'region':return f.regionalOwnership||'(blank)';
    case 'account':return f.accountName||'(blank)';
    case 'deliveredBy':return f.deliveredBy||'(blank)';
    case 'automation':return f.automationName||'(blank)';
    case 'category':return f.category||'(blank)';
    case 'goal':return f.goal||'(blank)';
    case 'environment':return f.environment||'(blank)';
    case 'aiUsed':return f.aiUsed===true?'Yes':f.aiUsed===false?'No':'Unknown';
  }
  return '(blank)';
}
function applyFilters(facts,filters){
  const active=Object.keys(filters).filter(k=>filters[k]!=null);
  if(!active.length) return facts;
  return facts.filter(f=>active.every(k=>dimVal(f,k)===filters[k]));
}
function monthsSince(d){ if(!d) return 0; const dd=new Date(d); if(isNaN(dd)) return 0; const m=(NOW.getFullYear()-dd.getFullYear())*12+(NOW.getMonth()-dd.getMonth()); return Math.max(0,m); }
function costTotal(f){ return (f.costOfImplementation||0)+monthsSince(f.deploymentDate)*(f.runningCost||0); }
function savings(f){ return 1500*(f.efficiencyImpact||0); }
function countBy(facts,dim){ const m=new Map(); for(const f of facts){const v=dimVal(f,dim);m.set(v,(m.get(v)||0)+1);} return [...m.entries()].map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value); }
function stackByProject(facts,dim){
  const projects=new Map(); const keys=new Set();
  for(const f of facts){ const p=f.accountName||'(blank)'; const k=dimVal(f,dim); keys.add(k); const row=projects.get(p)||{}; row[k]=(row[k]||0)+1; projects.set(p,row); }
  const ks=[...keys].sort();
  const rows=[...projects.entries()].map(([project,counts])=>({project,counts}));
  return {rows,keys:ks};
}
function automationsByProjects(facts){
  const m=new Map();
  for(const f of facts){ const n=f.automationName||'(blank)'; const e=m.get(n)||{accs:new Set(),occ:0}; e.accs.add(f.accountName); e.occ++; m.set(n,e); }
  return [...m.entries()].map(([name,e])=>({name,projects:e.accs.size,occ:e.occ})).sort((a,b)=>b.projects-a.projects||b.occ-a.occ||a.name.localeCompare(b.name));
}
function distinct(facts,dim){ const s=new Set(); for(const f of facts) s.add(dimVal(f,dim)); return [...s].sort((a,b)=>a.localeCompare(b)); }

function pieSVG(slices,dim){
  const total=slices.reduce((s,x)=>s+x.value,0);
  if(!total) return '<div class="empty">No data</div>';
  const cx=100,cy=100,r=80; let ang=0; let paths='';
  slices.forEach((s,i)=>{
    const frac=s.value/total; const a0=ang, a1=ang+frac*360; ang=a1;
    const p0=polar(cx,cy,r,a0), p1=polar(cx,cy,r,a1);
    const large=(a1-a0)>180?1:0;
    const d=total===s.value? `M ${cx-r} ${cy} a ${r} ${r} 0 1 0 ${2*r} 0 a ${r} ${r} 0 1 0 ${-2*r} 0`
      : `M ${cx} ${cy} L ${p0[0].toFixed(2)} ${p0[1].toFixed(2)} A ${r} ${r} 0 ${large} 1 ${p1[0].toFixed(2)} ${p1[1].toFixed(2)} Z`;
    paths+=`<path d="${d}" fill="${PALETTE[i%PALETTE.length]}" stroke="#fff" stroke-width="1" style="cursor:pointer" onclick="toggleFilter('${dim}',${JSON.stringify(s.name).replace(/"/g,'&quot;')})"><title>${esc(s.name)}: ${s.value}</title></path>`;
  });
  const legend='<div class="legend">'+slices.map((s,i)=>`<span class="li" onclick="toggleFilter('${dim}',${JSON.stringify(s.name).replace(/"/g,'&quot;')})"><span class="sw" style="background:${PALETTE[i%PALETTE.length]}"></span>${esc(s.name)} (${s.value})</span>`).join('')+'</div>';
  return `<div class="pie-wrap"><svg viewBox="0 0 200 200" width="100%" height="220">${paths}</svg></div>${legend}`;
}
function polar(cx,cy,r,deg){ const a=(deg-90)*Math.PI/180; return [cx+r*Math.cos(a),cy+r*Math.sin(a)]; }

function stackedBars(stack,dim){
  if(!stack.rows.length) return '<div class="empty">No data</div>';
  const totals=stack.rows.map(r=>stack.keys.reduce((s,k)=>s+(r.counts[k]||0),0));
  const max=Math.max(1,...totals);
  const keyColor={}; stack.keys.forEach((k,i)=>keyColor[k]=PALETTE[i%PALETTE.length]);
  const rows=stack.rows.map((r,idx)=>{
    const segs=stack.keys.filter(k=>r.counts[k]).map(k=>`<div class="bar-seg" title="${esc(r.project)} — ${esc(k)}: ${r.counts[k]}" style="width:${(r.counts[k]/max*100).toFixed(2)}%;background:${keyColor[k]}" onclick="toggleFilter('${dim}',${JSON.stringify(k).replace(/"/g,'&quot;')})"></div>`).join('');
    return `<div class="bar-row"><span class="lbl" title="${esc(r.project)}">${esc(r.project)}</span><div class="bar-track">${segs}</div><span class="bar-tot">${totals[idx]}</span></div>`;
  }).join('');
  const legend='<div class="legend">'+stack.keys.map(k=>`<span class="li" onclick="toggleFilter('${dim}',${JSON.stringify(k).replace(/"/g,'&quot;')})"><span class="sw" style="background:${keyColor[k]}"></span>${esc(k)}</span>`).join('')+'</div>';
  return rows+legend;
}

function renderDashboard(){
  const facts=DATA.automationFacts||[];
  const f=applyFilters(facts,state.filters);
  const projects=new Set(f.map(x=>x.accountName));
  const sophie=new Set(f.filter(x=>x.category==='Sophie').map(x=>x.accountName));
  const kpis=[
    ['Automations',fmtNum(f.length)],['Projects',fmtNum(projects.size)],
    ['Cost Total',fmtMoney(f.reduce((s,x)=>s+costTotal(x),0))],
    ['Estimated Saving / mo',fmtMoney(f.reduce((s,x)=>s+savings(x),0))],
    ['FTE Impact / mo',fmtNum(f.reduce((s,x)=>s+(x.efficiencyImpact||0),0))],
    ['Projects with Sophie',fmtNum(sophie.size)],
  ];
  const DROPS=[['region','Regional Ownership'],['account','Project'],['deliveredBy','Service Type'],['automation','Automation']];
  const filtersBar='<div class="filters">'+DROPS.map(([dim,label])=>{
    const opts=['<option value="">All</option>'].concat(distinct(facts,dim).map(o=>`<option value="${esc(o)}" ${state.filters[dim]===o?'selected':''}>${esc(o)}</option>`)).join('');
    return `<label class="f"><span>${label}</span><select onchange="setDropdown('${dim}',this.value)">${opts}</select></label>`;
  }).join('')+`<button class="btn" onclick="resetFilters()" ${Object.values(state.filters).every(v=>v==null)?'disabled':''}>Reset filters</button></div>`;
  const active=Object.keys(state.filters).filter(k=>state.filters[k]!=null);
  const chips=active.length?'<div class="chips">'+active.map(k=>`<button class="chip" onclick="clearFilter('${k}')">${esc(state.filters[k])} <span>&times;</span></button>`).join('')+'</div>':'';
  const kpiCards='<div class="kpis">'+kpis.map(([l,v])=>`<div class="kpi"><div class="val">${v}</div><div class="lab">${l}</div></div>`).join('')+'</div>';
  const at=automationsByProjects(f);
  const tableRows=at.length?at.map(r=>`<tr class="${state.filters.automation===r.name?'':''}" style="cursor:pointer" onclick="toggleFilter('automation',${JSON.stringify(r.name).replace(/"/g,'&quot;')})"><td>${esc(r.name)}</td><td class="num">${r.projects}</td><td class="num">${r.occ}</td></tr>`).join(''):'<tr><td colspan="3" class="empty">No automations match the filters.</td></tr>';
  const charts=`<div class="dgrid">
    <div class="card"><h3>Automations by Category</h3>${pieSVG(countBy(f,'category'),'category')}</div>
    <div class="card"><h3>Automations by Goal</h3>${pieSVG(countBy(f,'goal'),'goal')}</div>
    <div class="card"><h3>AI Used</h3>${pieSVG(countBy(f,'aiUsed'),'aiUsed')}</div>
    <div class="card wide"><h3>Categories per Project</h3>${stackedBars(stackByProject(f,'category'),'category')}</div>
    <div class="card wide"><h3>Goals per Project</h3>${stackedBars(stackByProject(f,'goal'),'goal')}</div>
    <div class="card wide"><h3>Automations by Number of Projects</h3><div class="scroll"><table class="grid"><thead><tr><th>Automation</th><th class="num"># of Projects</th><th class="num">Total Deployed</th></tr></thead><tbody>${tableRows}</tbody></table></div></div>
  </div>`;
  return `<h2 class="page">Automations</h2><div class="sub">Automations delivered across all accounts. Click any chart segment, legend item or table row to cross-filter every view.</div>${filtersBar}${chips}${kpiCards}${charts}`;
}

// ---- Home ----
function renderHome(){
  const rows=tableHTML([
    {label:'Account',get:a=>esc(a.name)},
    {label:'Regional Ownership',get:a=>{const o=(DATA.perAccount[String(a.id)]||{}).overall||{};return dash(o.regionalOwnership);}},
    {label:'Automations',num:true,get:a=>((DATA.perAccount[String(a.id)]||{}).automations||[]).length},
  ], accounts);
  return `<h2 class="page">Accounts</h2><div class="sub">${accounts.length} account(s) in this snapshot.</div>${rows}`;
}

function render(){
  renderSide();
  let html='';
  if(state.section==='home') html=renderHome();
  else if(state.section==='input') html=renderInput();
  else if(state.section==='admin') html=renderAdmin();
  else if(state.section==='dashboard') html=renderDashboard();
  document.getElementById('content').innerHTML=html;
}
window.go=go;window.setAccount=setAccount;window.setInputTab=setInputTab;window.setRefType=setRefType;
render();
</script>
